<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mind">
  <meta name="theme-color" content="#f4f3f0">
  <title>Mind</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- View 1: Today -->
    <div id="today-view" class="view active">
      <header class="app-header">
        <button id="review-btn" class="icon-btn" aria-label="View gallery and calendar">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </button>
        <div id="streak-display" class="streak"></div>
      </header>

      <main class="today-main">
        <div class="date-block">
          <span class="day-label" id="day-label"></span>
          <h1 class="date-heading" id="date-heading"></h1>
        </div>

        <p class="prompt-text">What are you grateful for today?</p>

        <div class="entries-section" id="entries-section"></div>

        <div class="media-section" id="media-section">
          <div id="photo-area"></div>
          <div id="voice-area"></div>
        </div>

        <!-- Prayer hands submit -->
        <div class="submit-area">
          <button id="submit-btn" class="submit-btn" aria-label="Submit today's entry">
            <svg class="submit-hands" viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span class="submit-label">Done for today</span>
          </button>
        </div>
      </main>
    </div>

    <!-- View 2: Review (gallery + calendar) -->
    <div id="review-view" class="view">
      <header class="app-header review-header">
        <button id="back-btn" class="icon-btn" aria-label="Back to today">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div class="tab-bar" role="tablist">
          <button class="tab-btn active" id="tab-throwback" role="tab" aria-selected="true" data-tab="throwback">Throwback</button>
          <button class="tab-btn" id="tab-calendar" role="tab" aria-selected="false" data-tab="calendar">Calendar</button>
        </div>
        <div class="icon-btn-placeholder"></div>
      </header>

      <div class="review-content">
        <div id="throwback-panel" class="review-panel active" role="tabpanel">
          <div class="throwback-feed" id="throwback-feed"></div>
        </div>
        <div id="calendar-panel" class="review-panel" role="tabpanel">
          <div id="calendar-wrap"></div>
        </div>
      </div>
    </div>

    <!-- Quote screen -->
    <div id="quote-screen" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Daily reflection">
      <div id="quote-bg" class="quote-bg"></div>
      <div class="quote-content">
        <button id="close-quote-btn" class="icon-btn quote-close" aria-label="Continue to review">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <div class="quote-body">
          <blockquote id="quote-text" class="quote-text"></blockquote>
          <p id="quote-author" class="quote-author"></p>
        </div>
        <div class="quote-actions">
          <button id="like-quote-btn" class="quote-action-btn" aria-label="Like this quote">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
          <button id="skip-quote-btn" class="quote-action-btn" aria-label="Next quote">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Image viewer overlay -->
    <div id="image-viewer" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Photo viewer">
      <div class="overlay-backdrop" id="image-backdrop"></div>
      <div class="viewer-content">
        <img id="viewer-img" src="" alt="Photo">
        <button id="close-viewer-btn" class="icon-btn viewer-close" aria-label="Close photo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Day detail overlay -->
    <div id="day-detail" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Day entry">
      <div class="overlay-backdrop"></div>
      <div class="overlay-panel">
        <div class="overlay-header">
          <button id="delete-detail-btn" class="icon-btn icon-btn--danger" aria-label="Delete entry">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
          </button>
          <h2 class="overlay-title" id="detail-date"></h2>
          <button id="close-detail-btn" class="icon-btn" aria-label="Close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="detail-body" class="detail-body"></div>
      </div>
    </div>

  </div>

  <input type="file" id="photo-input" accept="image/*" style="display:none">
  <script type="module" src="app.js"></script>
</body>
</html>
